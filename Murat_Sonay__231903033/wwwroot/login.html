<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LRP - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .role-selector {
            display: flex;
            margin-bottom: 2rem;
        }
        .role-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid #dee2e6;
            background: white;
            color: #6c757d;
            border-radius: 0.5rem;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }
        .role-btn.active {
            border-color: var(--role-color);
            background: var(--role-bg);
            color: var(--role-text);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .role-btn.admin.active {
            --role-color: #0d6efd;
            --role-bg: #e7f3ff;
            --role-text: #0d6efd;
        }
        .role-btn.student.active {
            --role-color: #198754;
            --role-bg: #e8f5e8;
            --role-text: #198754;
        }
        .card-header.admin {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
        }
        .card-header.student {
            background: linear-gradient(135deg, #198754, #146c43);
        }
        .btn-admin {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            border: none;
        }
        .btn-student {
            background: linear-gradient(135deg, #198754, #146c43);
            border: none;
        }
        .btn-admin:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
        }
        .btn-student:hover {
            background: linear-gradient(135deg, #146c43, #0f5132);
        }
    </style>
</head>
<body class="login-container">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card login-card shadow-lg fade-in-up">
                    <div class="card-header text-center text-white" id="cardHeader">
                        <h3 class="mb-0"><i class="fas fa-laptop-code me-2"></i>Laboratuvar Kaynak Planlama</h3>
                        <p class="mb-0 mt-2" id="roleTitle">Rol Seçin</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="role-selector">
                            <button class="role-btn admin" data-role="admin">
                                <i class="fas fa-cog me-2"></i>
                                <div>
                                    <strong>Admin Giriş</strong>
                                    <br><small>Yönetici Paneli</small>
                                </div>
                            </button>
                            <button class="role-btn student" data-role="student">
                                <i class="fas fa-user-graduate me-2"></i>
                                <div>
                                    <strong>Öğrenci Giriş</strong>
                                    <br><small>Bilgisayar Bilgileri</small>
                                </div>
                            </button>
                        </div>
                        <form id="loginForm" class="d-none">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">
                                    <i class="fas fa-user me-2"></i>Kullanıcı Adı
                                </label>
                                <input type="text" id="username" class="form-control" required placeholder="Kullanıcı adınızı girin" />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="fas fa-lock me-2"></i>Parola
                                </label>
                                <input type="password" id="password" class="form-control" required placeholder="Parolanızı girin" />
                            </div>
                            <div id="loginError" class="alert alert-danger d-none" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i><span id="errorText"></span>
                            </div>
                            <button type="submit" class="btn w-100 mt-3" id="loginBtn">
                                <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap
                            </button>
                        </form>
                        <div id="roleHint" class="text-center text-muted">
                            <small>Lütfen giriş yapmak istediğiniz rolü seçin</small>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        <div id="adminHint">
                            <i class="fas fa-key me-1"></i>Admin hesap: <code>admin</code> / <code>Admin@123</code>
                        </div>
                        <div id="studentHint" class="d-none">
                            <i class="fas fa-key me-1"></i>Öğrenci hesap: <code>231903006</code> / <code>231903006@2026</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const pageOrigin = window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin;
        let selectedRole = null;

        if (window.location.protocol === 'file:') {
            window.location.href = `${pageOrigin}/login.html`;
        }

        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const role = e.currentTarget.dataset.role;
                selectRole(role);
            });
        });

        // Varsayılan olarak admin rolünü seç ve giriş formunu göster
        selectRole('admin');

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-role="${role}"]`).classList.add('active');

            const cardHeader = document.querySelector('#cardHeader');
            const roleTitle = document.querySelector('#roleTitle');
            const loginBtn = document.querySelector('#loginBtn');
            const loginForm = document.querySelector('#loginForm');
            const roleHint = document.querySelector('#roleHint');
            const adminHint = document.querySelector('#adminHint');
            const studentHint = document.querySelector('#studentHint');

            cardHeader.className = `card-header text-center text-white ${role}`;
            loginBtn.className = `btn w-100 btn-${role}`;

            if (role === 'admin') {
                roleTitle.innerHTML = '<i class="fas fa-cog me-2"></i>Admin Giriş';
                loginForm.classList.remove('d-none');
                roleHint.classList.add('d-none');
                adminHint.classList.remove('d-none');
                studentHint.classList.add('d-none');
            } else {
                roleTitle.innerHTML = '<i class="fas fa-user-graduate me-2"></i>Öğrenci Giriş';
                loginForm.classList.remove('d-none');
                roleHint.classList.add('d-none');
                adminHint.classList.add('d-none');
                studentHint.classList.remove('d-none');
            }
        }

        document.querySelector('#loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!selectedRole) {
                showError('Lütfen bir rol seçin');
                return;
            }

            const username = document.querySelector('#username').value.trim();
            const password = document.querySelector('#password').value.trim();

            if (!username || !password) {
                showError('Kullanıcı adı ve parola gereklidir.');
                return;
            }

            const loginBtn = document.querySelector('#loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Giriş yapılıyor...';
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${pageOrigin}/api/auth/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    throw new Error('Kullanıcı adı veya parola hatalı.');
                }

                const result = await response.json();
                if (result.role === 'Admin') {
                    window.location.href = `${pageOrigin}/index.html`;
                } else {
                    window.location.href = `${pageOrigin}/student.html`;
                }
            } catch (e) {
                showError(e.message);
            } finally {
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.querySelector('#loginError');
            const errorText = document.querySelector('#errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('d-none');
            setTimeout(() => errorDiv.classList.add('d-none'), 5000);
        }

        (async () => {
            try {
                const user = await apiFetch('/api/auth/user');
                if (user.role === 'Admin') {
                    window.location.href = `${pageOrigin}/index.html`;
                } else if (user.role === 'Student') {
                    window.location.href = `${pageOrigin}/student.html`;
                }
            } catch {
                // Not logged in yet.
            }
        })();
    </script>
</body>
</html>
