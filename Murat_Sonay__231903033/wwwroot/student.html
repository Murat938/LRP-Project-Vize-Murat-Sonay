<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar bg-dark text-white">
            <div class="sidebar-header">
                <h4><i class="fas fa-user-graduate me-2"></i>Öğrenci</h4>
                <p class="text-white-50 mb-0 small">Bilgisayar Bilgileri</p>
            </div>
            <nav class="nav flex-column sidebar-nav">
                <a href="#" class="nav-link text-white" data-page="overview">
                    <i class="fas fa-desktop me-2"></i>Zimmetli Bilgisayarım
                </a>
            </nav>
            <button id="logoutButton" class="btn btn-outline-light mt-auto mb-3">
                <i class="fas fa-sign-out-alt me-2"></i>Çıkış Yap
            </button>
        </aside>
        <main class="content p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2><i class="fas fa-user-graduate me-2"></i>Öğrenci Paneli</h2>
                    <p class="text-muted mb-0">Sadece sana atanan bilgisayarın bilgilerini gör</p>
                </div>
                <div id="currentUser" class="text-end text-secondary">
                    <i class="fas fa-user-circle me-1"></i><span></span>
                </div>
            </div>
            <div id="pageContent"></div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
